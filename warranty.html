<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty Registration | Skyban Roofing Systems</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.jpg" alt="Skyban Roofing Systems" style="height: 60px;">
            </a>
            <a href="request-sample.html" class="cta-button">REQUEST SAMPLE</a>
        </nav>
    </header>

    <section style="padding: 80px 10%; max-width: 900px; margin: 0 auto;">
        <h1 style="font-size: 36px; margin-bottom: 20px;">WARRANTY REGISTRATION</h1>
        <p style="margin-bottom: 40px;">Protect your investment. Register your Skyban roof within 30 days of installation to activate your 50-year limited warranty.</p>
        
        <form action="#" style="background: var(--gray-light); padding: 40px; border-radius: 10px;">
            <h3 style="margin-bottom: 20px;">CUSTOMER INFORMATION</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: 700;">Full Name</label>
                    <input type="text" style="width: 100%; padding: 10px; border: 1px solid #ddd;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: 700;">Phone Number</label>
                    <input type="tel" style="width: 100%; padding: 10px; border: 1px solid #ddd;">
                </div>
            </div>
            
            <h3 style="margin: 30px 0 20px;">PROJECT INFORMATION</h3>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 700;">Installation Address</label>
                <textarea rows="3" style="width: 100%; padding: 10px; border: 1px solid #ddd;"></textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: 700;">Installation Date</label>
                    <input type="date" style="width: 100%; padding: 10px; border: 1px solid #ddd;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: 700;">Invoice Number</label>
                    <input type="text" style="width: 100%; padding: 10px; border: 1px solid #ddd;">
                </div>
            </div>
            
            <h3 style="margin: 30px 0 20px;">PRODUCT DETAILS</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: 700;">Profile Installed</label>
                    <select style="width: 100%; padding: 10px; border: 1px solid #ddd;">
                        <option>Shingle</option>
                        <option>Shake</option>
                        <option>Classic</option>
                        <option>Bond</option>
                        <option>Roman</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: 700;">Total Area (sq. ft.)</label>
                    <input type="number" style="width: 100%; padding: 10px; border: 1px solid #ddd;">
                </div>
            </div>
            
            <button type="submit" class="cta-button" style="width: 100%;">REGISTER WARRANTY</button>
        </form>
    </section>

    <footer style="background: #1a1a1a; color: white; padding: 40px 5%; text-align: center;">
        <p>© 2026 Skyban Roofing Systems. All rights reserved.</p>
    </footer>
</body>
</html>
